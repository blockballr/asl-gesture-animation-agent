<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL Signer — render spike</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #0b0e14; color: #e6e9ef; font-family: system-ui, sans-serif; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      .hud {
        position: fixed; left: 16px; top: 16px; z-index: 10;
        background: rgba(20, 24, 33, 0.72); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
        padding: 14px 16px; max-width: 280px; line-height: 1.45; font-size: 13px;
      }
      .hud h1 { font-size: 14px; margin-bottom: 6px; letter-spacing: 0.2px; }
      .hud .tag { color: #7c8394; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
      .hud .clip { margin-top: 8px; color: #9fb4ff; font-weight: 600; }
      .hud .hint { margin-top: 8px; color: #7c8394; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <div class="tag">Milestone 1 · render spike</div>
      <h1>ASL Signer</h1>
      <div>Hand skeleton driven by a hardcoded landmark keyframe clip — the same data contract real signs will use.</div>
      <div class="clip">▶ playing: <span id="clip-name">wave</span></div>
      <div class="hint">drag to orbit · scroll to zoom</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
